name: CI

on:
  push:
    branches: [ main, 'feature/**', 'fix/**', 'release/**' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test with coverage
        run: |
          dotnet test HVO.Enterprise.sln \
            --no-build \
            --configuration Release \
            --settings tests/coverage.runsettings \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --logger "trx;LogFileName=test-results.trx"

      - name: Install ReportGenerator
        if: always()
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        if: always()
        run: |
          reportgenerator \
            -reports:"TestResults/**/coverage.cobertura.xml" \
            -targetdir:"coverage-report" \
            -reporttypes:"Html;TextSummary;MarkdownSummaryGithub;Badges;Cobertura"

      - name: Parse coverage and test results for badges
        if: always()
        id: coverage
        run: |
          LINE_COV=$(grep 'Line coverage' coverage-report/Summary.txt | grep -oP '[\d.]+(?=%)' || echo "0")
          BRANCH_COV=$(grep 'Branch coverage' coverage-report/Summary.txt | grep -oP '[\d.]+(?=%)' || echo "0")
          METHOD_COV=$(grep 'Method coverage' coverage-report/Summary.txt | grep -oP '[\d.]+(?=%)' || echo "0")
          echo "line=$LINE_COV" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH_COV" >> "$GITHUB_OUTPUT"
          echo "method=$METHOD_COV" >> "$GITHUB_OUTPUT"

          # Parse test count from TRX file
          TESTS_PASSED=$(grep -oP 'passed="\K[0-9]+' TestResults/test-results.trx 2>/dev/null || echo "0")
          TESTS_FAILED=$(grep -oP 'failed="\K[0-9]+' TestResults/test-results.trx 2>/dev/null || echo "0")
          TESTS_TOTAL=$(grep -oP 'total="\K[0-9]+' TestResults/test-results.trx 2>/dev/null || echo "0")
          echo "tests_passed=$TESTS_PASSED" >> "$GITHUB_OUTPUT"
          echo "tests_failed=$TESTS_FAILED" >> "$GITHUB_OUTPUT"
          echo "tests_total=$TESTS_TOTAL" >> "$GITHUB_OUTPUT"

          echo "### Code Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Line coverage | ${LINE_COV}% |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch coverage | ${BRANCH_COV}% |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Method coverage | ${METHOD_COV}% |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests | ${TESTS_PASSED} passed / ${TESTS_TOTAL} total |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish test results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Test Results
          path: TestResults/test-results.trx
          reporter: dotnet-trx

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage-report/
          retention-days: 30

      - name: Upload coverage badges
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-badges
          path: coverage-report/badge_*.svg
          retention-days: 90

      # -------------------------------------------------------------------
      # Dynamic badges via gist (requires GIST_TOKEN secret with gist scope)
      # -------------------------------------------------------------------
      - name: Update line coverage badge
        if: github.ref == 'refs/heads/main' && always()
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.COVERAGE_GIST_ID }}
          filename: coverage-line.json
          label: line coverage
          message: ${{ steps.coverage.outputs.line }}%
          valColorRange: ${{ steps.coverage.outputs.line }}
          minColorRange: 40
          maxColorRange: 80

      - name: Update branch coverage badge
        if: github.ref == 'refs/heads/main' && always()
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.COVERAGE_GIST_ID }}
          filename: coverage-branch.json
          label: branch coverage
          message: ${{ steps.coverage.outputs.branch }}%
          valColorRange: ${{ steps.coverage.outputs.branch }}
          minColorRange: 30
          maxColorRange: 70

      - name: Update tests badge
        if: github.ref == 'refs/heads/main' && always()
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.COVERAGE_GIST_ID }}
          filename: tests.json
          label: tests
          message: "${{ steps.coverage.outputs.tests_passed }} passed"
          color: ${{ steps.coverage.outputs.tests_failed == '0' && 'brightgreen' || 'red' }}

  integration-tests:
    name: Integration Tests (Docker backends)
    runs-on: ubuntu-latest
    # Run integration tests on pushes to main/feature branches and on PRs targeting main.
    # They are a non-blocking informational job — failures create a visible annotation
    # but do not prevent merging (continue-on-error: true).
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Start backend services and wait for healthy
        run: |
          # --wait blocks until every service with a healthcheck reports healthy,
          # or exits non-zero if they don't become healthy within --timeout seconds.
          docker compose -f docker-compose.test.yml up -d --wait --timeout 120
          echo "All services are healthy."
          docker compose -f docker-compose.test.yml ps

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run integration tests
        env:
          HVO_POSTGRES_HOST_LOCAL: "127.0.0.1"
          HVO_POSTGRES_PORT: "5432"
          HVO_POSTGRES_DATABASE: "hvo"
          HVO_POSTGRES_USERNAME: "hvo_dev"
          HVO_POSTGRES_PASSWORD: "hvo_dev_password"
          HVO_REDIS_HOST_LOCAL: "127.0.0.1"
          HVO_REDIS_PORT: "6379"
          HVO_RABBITMQ_HOST: "127.0.0.1"
          HVO_RABBITMQ_PORT: "5672"
          HVO_RABBITMQ_USER: "guest"
          HVO_RABBITMQ_PASS: "guest"
          HVO_OTLP_GRPC_HOST: "127.0.0.1"
          HVO_OTLP_GRPC_PORT: "4317"
          HVO_OTLP_HTTP_HOST: "127.0.0.1"
          HVO_OTLP_HTTP_PORT: "4318"
          HVO_OTLP_HEALTH_HOST: "127.0.0.1"
          HVO_OTLP_HEALTH_PORT: "13133"
        run: |
          dotnet test HVO.Enterprise.sln \
            --no-build \
            --configuration Release \
            --filter "TestCategory=Integration" \
            --results-directory ./TestResults-Integration \
            --logger "trx;LogFileName=integration-test-results.trx" \
            --logger "console;verbosity=normal"

      - name: Publish integration test results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Integration Test Results
          path: TestResults-Integration/integration-test-results.trx
          reporter: dotnet-trx

      - name: Stop backend services
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
