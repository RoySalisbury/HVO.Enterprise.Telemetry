# Docker Compose for integration testing — spins up real backends used
# by tests tagged [TestCategory("Integration")].
#
# Usage (local):
#   docker compose -f docker-compose.test.yml up -d
#   dotnet test --filter "TestCategory=Integration"
#   docker compose -f docker-compose.test.yml down
#
# CI: see .github/workflows/ci.yml (integration-tests job)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: hvo_dev
      POSTGRES_PASSWORD: hvo_dev_password
      POSTGRES_DB: hvo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hvo_dev -d hvo"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5672:5672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 20

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./tests/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "127.0.0.1:4317:4317"    # OTLP gRPC
      - "127.0.0.1:4318:4318"    # OTLP HTTP/Protobuf
      - "127.0.0.1:13133:13133"  # Health check extension
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:13133/"]
      interval: 5s
      timeout: 3s
      retries: 20
